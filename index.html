<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños Karen</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Verdana;
}

canvas {
    display: block;
}

#foto {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    border-radius: 15px;
    opacity: 0;
    transition: 2s;
}

#msg {
    position: absolute;
    width: 100%;
    bottom: 10%;
    text-align: center;
    color: white;
    font-size: 22px;
    opacity: 0;
    transition: 2s;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<img id="foto" src="karen.jpg">

<div id="msg">🎉 Te desea Producción Foodbox 🎂</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let w, h;

function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const text = "FELIZ CUMPLEAÑOS KAREN";
const letters = text.split("");

let particles = [];

letters.forEach((letter, i) => {
    particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        targetX: w / 2 - (letters.length * 12) + i * 24,
        targetY: h / 2,
        color: `hsl(${Math.random()*360},100%,60%)`
    });
});

// 💣 Bombas (más lentas y grandes)
let bombs = [];
let explosions = [];

function launchBomb() {
    bombs.push({
        x: Math.random() * w,
        y: h,
        speed: Math.random() * 1.2 + 0.8, // 🔽 MUCHO más lento
        size: Math.random() * 6 + 6,      // 🔼 bomba más grande
        color: `hsl(${Math.random()*360},100%,60%)`
    });
}

setInterval(launchBomb, 1500);

// 💥 Explosión GRANDE
function explode(x, y) {
    explosions.push({
        x,
        y,
        particles: Array.from({length: 120}).map(() => ({ // 🔼 muchas partículas
            dx: (Math.random() - 0.5) * 14,
            dy: (Math.random() - 0.5) * 14,
            life: 100, // 🔼 dura más
            size: Math.random() * 4 + 3, // 🔼 partículas grandes
            color: `hsl(${Math.random()*360},100%,60%)`
        }))
    });
}

let frame = 0;

function animate() {
    frame++;
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, w, h);

    ctx.font = "28px Verdana";

    // Texto
    particles.forEach((p, i) => {
        p.x += (p.targetX - p.x) * 0.05;
        p.y += (p.targetY - p.y) * 0.05;

        ctx.fillStyle = p.color;
        ctx.fillText(letters[i], p.x, p.y);
    });

    // 💣 Bombas subiendo
    bombs.forEach((b, index) => {
        b.y -= b.speed;

        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); // 🔵 forma de bomba
        ctx.fill();

        if (b.y < h / 2) {
            explode(b.x, b.y);
            bombs.splice(index, 1);
        }
    });

    // 💥 Explosiones
    explosions.forEach(exp => {
        exp.particles.forEach(p => {
            p.life--;

            ctx.fillStyle = p.color;
            ctx.fillRect(
                exp.x + p.dx * (100 - p.life),
                exp.y + p.dy * (100 - p.life),
                p.size,
                p.size
            );
        });
    });

    explosions = explosions.filter(e => 
        e.particles.some(p => p.life > 0)
    );

    // Mostrar imagen y mensaje
    if (frame > 100) {
        document.getElementById("foto").style.opacity = 1;
    }

    if (frame > 160) {
        document.getElementById("msg").style.opacity = 1;
    }

    requestAnimationFrame(animate);
}

animate();
</script>
